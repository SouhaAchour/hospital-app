<div class="page">
  <div class="card">
    <h2>Connexion</h2>
    <p class="subtitle">Connectez-vous à votre compte</p>

    <form (ngSubmit)="login()">
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe" required>

      <button class="btn btn-primary full" type="submit">Se connecter</button>
    </form>

    <div *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </div>

    <div class="links">
      <button type="button" class="btn btn-light" (click)="goToRegister()">S'inscrire</button>
      <button type="button" class="btn btn-outline" (click)="goToHome()">Retour à l’accueil</button>
    </div>
  </div>
</div>
